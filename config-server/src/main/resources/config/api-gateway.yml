server:
  port: 8080

spring:
  cloud:
    gateway:
      default-filters:
        - name: AuthenticationFilter
      routes:
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/v1/carts/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/recommendations/**, /api/v1/assistant/**, /api/v1/search/**

jwt:
  secret: 9a4f2c8d3b7a5e1f9c8b7d6a5e4f3c2b1a0d9e8f7c6b5a4f3e2d1c0b9a8f7e6d # 256-bit key for HMAC
  expiration: 86400000 # 24 Hours
